<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Noche Libre · Sistema de Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* =============================================================
   TOKENS — Paleta nocturna de bar
   ============================================================= */
:root{
  --bg:          #080A14;
  --bg-alt:      #0F1222;
  --surface:     #141728;
  --surface-hi:  #1C2040;
  --border:      #252A4A;
  --border-hi:   #3A4080;
  --ink:         #EDE9FF;
  --ink-mid:     #A8A3CC;
  --ink-soft:    #6862A0;
  --neon:        #B06FFF;
  --neon-dim:    #7A40CC;
  --neon-glow:   rgba(176,111,255,0.22);
  --neon-glow-lg:rgba(176,111,255,0.10);
  --amber:       #E8A830;
  --amber-dim:   #B07818;
  --amber-glow:  rgba(232,168,48,0.18);
  --teal:        #28D9B4;
  --teal-dim:    #1A9E83;
  --danger:      #FF5252;
  --danger-dim:  #CC3030;
  --warn:        #F5A623;
  --shadow:      0 8px 32px rgba(0,0,0,0.5);
  --shadow-neon: 0 0 20px var(--neon-glow), 0 4px 16px rgba(0,0,0,0.5);
  --radius:      14px;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  color-scheme: dark;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 0% 0%, rgba(176,111,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(232,168,48,0.04) 0%, transparent 50%);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'DM Serif Display',serif;font-weight:400;margin:0 0 4px;letter-spacing:-.01em;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:var(--neon);}
::selection{background:var(--neon-dim);color:#fff;}

/* =============================================================
   SCROLL
   ============================================================= */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg-alt);}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px;}

/* =============================================================
   BOTONES
   ============================================================= */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 18px;border-radius:10px;border:1px solid var(--border-hi);
  font-weight:600;font-size:14px;transition:.15s;
  background:var(--surface-hi);color:var(--ink);
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.btn:active{transform:none;}
.btn-primary{
  background: linear-gradient(135deg, #8A42FF, var(--neon));
  border-color:var(--neon);color:#fff;
  box-shadow: 0 0 0 0 var(--neon-glow);
}
.btn-primary:hover{box-shadow:var(--shadow-neon);}
.btn-amber{
  background:linear-gradient(135deg,var(--amber-dim),var(--amber));
  border-color:var(--amber);color:#0a0800;
}
.btn-amber:hover{box-shadow:0 0 20px var(--amber-glow),0 4px 16px rgba(0,0,0,.5);}
.btn-success{background:var(--teal-dim);border-color:var(--teal);color:#fff;}
.btn-success:hover{background:var(--teal);box-shadow:0 0 16px rgba(40,217,180,.3);}
.btn-danger{background:transparent;border-color:var(--danger);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
.btn-ghost:hover{color:var(--ink);background:var(--surface-hi);}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* =============================================================
   INPUTS
   ============================================================= */
.field{text-align:left;margin-bottom:14px;}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;border-radius:10px;
  border:1px solid var(--border-hi);
  background:var(--surface);font-size:14.5px;color:var(--ink);
  transition:.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--neon);
  box-shadow:0 0 0 3px var(--neon-glow);
}
.field input::placeholder{color:var(--ink-soft);}
.field select option{background:var(--surface);}
.field textarea{resize:vertical;min-height:70px;}
.search-bar{margin-bottom: 15px;}

/* =============================================================
   LOGIN
   ============================================================= */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 30% 40%, rgba(176,111,255,.12) 0%, transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(232,168,48,.07) 0%, transparent 40%);
  pointer-events:none;
}
.login-card{
  width:100%;max-width:380px;background:var(--surface);
  border:1px solid var(--border-hi);border-radius:20px;
  padding:38px 32px;box-shadow:var(--shadow);text-align:center;
  position:relative;z-index:1;
}
.login-logo{
  width:66px;height:66px;border-radius:18px;
  background:linear-gradient(135deg,#5A20C0,var(--neon));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:30px;margin:0 auto 16px;
  box-shadow:0 0 32px var(--neon-glow), 0 4px 12px rgba(0,0,0,.5);
}
.login-card h1{font-size:28px;color:#fff;margin-bottom:4px;}
.login-card .tag{color:var(--ink-soft);margin-bottom:26px;font-size:13.5px;}
.login-error{color:var(--danger);font-size:13px;margin-bottom:10px;min-height:18px;font-weight:600;}

/* =============================================================
   APP SHELL
   ============================================================= */
.app-shell{display:flex;min-height:100vh;}
.sidebar{
  width:214px;flex-shrink:0;
  background:var(--bg-alt);
  border-right:1px solid var(--border);
  padding:18px 12px;
  display:flex;flex-direction:column;gap:3px;
  position:sticky;top:0;height:100vh;overflow:auto;
}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px;}
.sidebar-brand .logo{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg,#5A20C0,var(--neon));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 14px var(--neon-glow);
}
.sidebar-brand strong{font-family:'DM Serif Display',serif;font-size:15px;color:#fff;display:block;line-height:1.1;}
.sidebar-brand span{font-size:10.5px;color:var(--ink-soft);}
.navbtn{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  background:transparent;color:var(--ink-mid);border:none;text-align:left;
  font-size:13.5px;font-weight:600;width:100%;transition:.15s;
}
.navbtn .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.navbtn:hover{background:var(--surface);color:var(--ink);}
.navbtn.active{
  background:var(--surface-hi);color:#fff;
  box-shadow:inset 3px 0 0 var(--neon), 0 0 16px var(--neon-glow-lg);
}
.navbtn.active .ic{filter:drop-shadow(0 0 5px var(--neon));}
.sidebar-foot{margin-top:auto;display:flex;flex-direction:column;gap:5px;padding-top:12px;border-top:1px solid var(--border);}
.userchip{padding:6px 8px;font-size:12px;color:var(--ink-soft);line-height:1.5;}
.userchip b{display:block;font-size:13.5px;color:var(--ink);}
.topbar{display:none;}
.main{flex:1;min-width:0;padding:24px 28px 100px;max-width:1240px;}

/* =============================================================
   VISTAS — CABECERA
   ============================================================= */
.view-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
.view-head h2{font-size:28px;color:#fff;}
.view-head p{color:var(--ink-soft);font-size:13.5px;margin:2px 0 0;}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-soft);font-weight:700;margin-bottom:10px;}

/* =============================================================
   CARDS / SUPERFICIES
   ============================================================= */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);
}
.card-neon{
  border-color:var(--neon-dim);
  box-shadow:0 0 24px var(--neon-glow-lg), var(--shadow);
}

/* =============================================================
   CHIPS / FILTROS
   ============================================================= */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.chip{
  padding:7px 15px;border-radius:99px;
  border:1px solid var(--border-hi);background:var(--surface);
  font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s;
}
.chip:hover{border-color:var(--neon-dim);color:var(--ink);}
.chip.active{
  background:var(--surface-hi);border-color:var(--neon);
  color:#fff;box-shadow:0 0 12px var(--neon-glow);
}

/* =============================================================
   BADGES
   ============================================================= */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;padding:4px 9px;
  border-radius:99px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;
}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-espera    {background:rgba(232,168,48,.12);color:var(--amber);}
.badge-en_barra  {background:rgba(176,111,255,.12);color:var(--neon);}
.badge-listo     {background:rgba(40,217,180,.12);color:var(--teal);}
.badge-entregado {background:rgba(100,255,180,.08);color:#5ecf90;}
.badge-pagado    {background:rgba(40,217,180,.12);color:var(--teal);}
.badge-pendiente {background:rgba(255,82,82,.12);color:var(--danger);}

/* =============================================================
   MENU / PRODUCTOS
   ============================================================= */
.order-grid{display:grid;grid-template-columns:1.35fr 1fr;gap:18px;align-items:start;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;}
.prod-tile{
  border:1px solid var(--border);background:var(--surface-hi);
  border-radius:12px;padding:13px 12px;text-align:left;
  transition:.15s;cursor:pointer;width:100%;
}
.prod-tile:hover{border-color:var(--neon);box-shadow:0 0 14px var(--neon-glow);}
.prod-tile .pname{font-weight:700;font-size:13.5px;color:#fff;display:block;line-height:1.3;}
.prod-tile .pcat{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;display:block;}
.prod-tile .pprice{font-family:'IBM Plex Mono',monospace;color:var(--amber);font-weight:600;margin-top:8px;display:block;font-size:15px;}
.pdesc{font-size:10.5px;color:var(--ink-mid);margin-top:4px;display:block;}

/* =============================================================
   CARRITO
   ============================================================= */
.cart-item{display:flex;align-items:flex-start;gap:8px;padding:11px 0;border-bottom:1px solid var(--border);}
.cart-item:last-child{border-bottom:none;}
.cart-item .ci-main{flex:1;min-width:0;}
.cart-item .ci-name{font-weight:700;font-size:14px;color:#fff;}
.cart-item .ci-note{
  font-size:12px;color:var(--ink-soft);border:1px solid var(--border);
  background:var(--bg-alt);border-radius:7px;padding:4px 8px;width:100%;margin-top:5px;
  color:var(--ink);
}
.cart-item .ci-note:focus{outline:none;border-color:var(--neon);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-ctrl button{
  width:26px;height:26px;border-radius:7px;
  border:1px solid var(--border-hi);background:var(--surface);
  color:var(--ink);font-weight:700;line-height:1;cursor:pointer;transition:.12s;
}
.qty-ctrl button:hover{border-color:var(--neon);color:var(--neon);}
.qty-ctrl span{min-width:20px;text-align:center;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#fff;}
.ci-price{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;color:var(--amber);white-space:nowrap;}
.total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:14px;margin-top:10px;border-top:1px solid var(--border-hi);
  font-family:'DM Serif Display',serif;
}
.total-row span:last-child{
  font-size:24px;color:var(--amber);
  text-shadow:0 0 20px var(--amber-glow);
}
.empty-cart{padding:32px 10px;text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.8;}

/* =============================================================
   BARRA (cocina de bebidas)
   ============================================================= */
.ticket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:16px;}
.ticket-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow);
  transition:.15s;
}
.ticket-card.status-espera    {border-top:3px solid var(--amber);}
.ticket-card.status-en_barra  {border-top:3px solid var(--neon);box-shadow:0 0 18px var(--neon-glow-lg),var(--shadow);}
.ticket-card.status-listo     {border-top:3px solid var(--teal);box-shadow:0 0 18px rgba(40,217,180,.12),var(--shadow);}
.ticket-card.status-entregado {border-top:3px solid #5ecf90;opacity:.7;}
.ticket-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.ticket-folio{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;color:var(--neon);}
.ticket-meta{font-size:12px;color:var(--ink-soft);margin-top:3px;}
.ticket-body{padding:12px 16px;}
.ticket-body ul{margin:0;padding:0;list-style:none;}
.ticket-body li{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;gap:8px;border-bottom:1px dotted var(--border);}
.ticket-body li:last-child{border-bottom:none;}
.ticket-body li span{color:var(--ink);}
.ticket-body li b{font-family:'IBM Plex Mono',monospace;color:var(--amber);white-space:nowrap;}
.ticket-note{margin-top:10px;background:var(--bg-alt);border-left:3px solid var(--neon);border-radius:0 8px 8px 0;padding:8px 10px;font-size:12.5px;color:var(--ink-soft);}

.status-rail{display:flex;align-items:center;padding:12px 16px 4px;}
.status-rail .rdot{width:10px;height:10px;border-radius:50%;background:var(--border-hi);flex-shrink:0;}
.status-rail .rseg{flex:1;height:2px;background:var(--border-hi);}
.status-rail .rdot.done{background:var(--neon);box-shadow:0 0 8px var(--neon-glow);}
.status-rail .rseg.done{background:var(--neon);}
.ticket-foot{display:flex;gap:8px;padding:10px 16px 14px;flex-wrap:wrap;}

/* =============================================================
   CAJA
   ============================================================= */
.caja-grid{display:grid;grid-template-columns:1fr 380px;gap:18px;align-items:start;}
.caja-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border:1px solid var(--border);
  border-radius:12px;background:var(--surface);
  margin-bottom:10px;gap:10px;flex-wrap:wrap;transition:.15s;
}
.caja-row:hover{border-color:var(--border-hi);}
.caja-row .cname{font-weight:700;color:#fff;font-size:15px;}
.caja-row .csub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.caja-row .camount{
  font-family:'IBM Plex Mono',monospace;font-weight:600;
  font-size:17px;color:var(--amber);
  text-shadow:0 0 14px var(--amber-glow);
}
.split-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.split-row input{flex:1;}

/* =============================================================
   STATS / CORTE
   ============================================================= */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);}
.stat-card.neon-card{border-color:var(--neon-dim);box-shadow:0 0 20px var(--neon-glow-lg);}
.stat-label{font-size:11.5px;text-transform:uppercase;color:var(--ink-soft);font-weight:700;letter-spacing:.04em;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--amber);margin-top:6px;text-shadow:0 0 16px var(--amber-glow);}
.stat-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;}

/* =============================================================
   TABLAS
   ============================================================= */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);padding:8px 10px;border-bottom:1px solid var(--border-hi);}
table td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--ink);}
table tr:last-child td{border-bottom:none;}
table tr:hover td{background:var(--surface-hi);}
.table-wrap{overflow-x:auto;}

/* =============================================================
   MODAL & TOAST
   ============================================================= */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal{
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:18px;padding:26px;width:100%;max-width:460px;
  max-height:90vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.7), 0 0 40px var(--neon-glow);
}
.modal h2{color:#fff;margin-bottom:14px;font-size:22px;}
.modal-close{float:right;background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;transition:.15s;}
.modal-close:hover{color:#fff;}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface-hi);border:1px solid var(--neon-dim);
  color:#fff;padding:12px 22px;border-radius:99px;font-size:13.5px;font-weight:600;
  box-shadow:0 0 24px var(--neon-glow), var(--shadow);
  z-index:200;opacity:0;transition:.25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

.loader-overlay {
  position: fixed; inset: 0; background: var(--bg); display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; color: var(--neon); font-family: 'DM Serif Display', serif; font-size: 24px;
}

/* Utils */
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.muted{color:var(--ink-soft);}
.empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.empty-state .eic{font-size:40px;display:block;margin-bottom:12px;}
.hist-list{max-height:360px;overflow:auto;}
.hist-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--ink);}
.hist-item .ht{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.neon-text{color:var(--neon);text-shadow:0 0 12px var(--neon-glow);}
.amber-text{color:var(--amber);text-shadow:0 0 12px var(--amber-glow);}

/* =============================================================
   RESPONSIVE
   ============================================================= */
@media(max-width:1000px){.order-grid,.caja-grid{grid-template-columns:1fr;}}
@media(max-width:760px){
  .sidebar{display:none;}
  .app-shell{flex-direction:column;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--bg-alt);border-bottom:1px solid var(--border);
    padding:14px 16px;position:sticky;top:0;z-index:20;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
  }
  .topbar .tb-brand{display:flex;align-items:center;gap:9px;font-family:'DM Serif Display',serif;font-size:17px;color:#fff;}
  .topbar .tb-brand .tl{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5A20C0,var(--neon));display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 12px var(--neon-glow);}
  .main{padding:16px 14px 96px;}
  .bottomnav{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--bg-alt);border-top:1px solid var(--border);
    display:flex;z-index:20;
    padding:6px 4px calc(env(safe-area-inset-bottom,0px) + 4px);
  }
  .bottomnav button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;padding:8px 2px;
    font-size:10px;font-weight:700;color:var(--ink-soft);cursor:pointer;
  }
  .bottomnav button.active{color:var(--neon);}
  .bottomnav button.active .bic{filter:drop-shadow(0 0 5px var(--neon));}
  .ticket-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root">
  <div class="loader-overlay">Cargando base de datos...</div>
</div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================================
   NOCHE LIBRE · Sistema POS para Bar con GitHub + Google Sheets (Backend)
   ========================================================================= */

// ======== IMPORTANTE: INSERTA TU URL DE GOOGLE APPS SCRIPT AQUÍ ========
const API_URL = 'https://script.google.com/macros/s/AKfycbwTV3glEn1Lyx0Lfq3GhWUsM8efzMkRnHPAiPSznhyi2dYMCjQ1CH7FJk6sTKq3IrmI/exec'; 

const DB_KEY      = 'barDB_v1';
const SESSION_KEY = 'barSession_v1';

/* ---------- Helpers ---------- */
function todayKey(d=new Date()){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function money(n){return '$'+(Number(n)||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDT(iso){const d=new Date(iso);return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

/* ---------- Base de Datos (Local + Sincronización) ---------- */
function loadDBLocally() {
  let r = localStorage.getItem(DB_KEY);
  if (!r) return null;
  try { return JSON.parse(r); } catch { return null; }
}

function saveDB(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  syncToServer(db); // Sincronización en segundo plano con Sheets
}

function nextId(db, k) {
  const n = Number(db.counters[k]) || 1;
  db.counters[k] = n + 1;
  return n;
}

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
}

function setSession(u) { sessionStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
function clearSession() { sessionStorage.removeItem(SESSION_KEY); }

async function fetchInitialData() {
  if (!API_URL || API_URL === 'TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI') {
    alert("ADVERTENCIA: No has colocado la URL de Google Apps Script. El sistema correrá solo localmente.");
    return loadDBLocally() || mockFallbackDB();
  }
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    localStorage.setItem(DB_KEY, JSON.stringify(data));
    return data;
  } catch (err) {
    console.error("Error al descargar DB, usando cache local", err);
    return loadDBLocally() || mockFallbackDB();
  }
}

function syncToServer(db) {
  if (!API_URL || API_URL === 'TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI') return;
  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'SYNC', db: db }),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
  }).catch(e => console.error("Error sincronizando a GAS", e));
}

function mockFallbackDB() {
  return {
    counters: { order: 1, user: 2, product: 1, resetWeek: null, resetMonth: null },
    users: [{ id: 1, username: 'Brian', password: '1234', name: 'Brian', role: 'admin' }],
    products: [],
    orders: [],
    history: [],
    closures: [],
    cash: { date: null, initial: null, openedBy: null }
  };
}

/* ---------- Historial ---------- */
function logHistory(action, detail) {
  const db = loadDBLocally(); 
  const s = getSession();
  db.history.unshift({ id: uid(), ts: new Date().toISOString(), user: s ? s.name : '—', role: s ? s.role : '—', action, detail });
  if (db.history.length > 500) db.history.length = 500;
  saveDB(db);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__tto);
  window.__tto = setTimeout(() => t.classList.remove('show'), 2400);
}

const ROLE_VIEWS = {

  mesero: ['comandas'],
  bartender: ['barra'],
  cajero: ['caja']

  barra: { label: 'Barra', icon: '🍸' },
  caja: { label: 'Caja', icon: '💵' },
  productos: { label: 'Productos', icon: '📦' },

};
const BAR_STEPS = ['espera', 'en_barra', 'listo', 'entregado'];
const BAR_LABEL = { espera: 'En espera', en_barra: 'En Barra', listo: 'Listo', entregado: 'Entregado' };

let state = {

};

/* ==========================================================================
   LOGIN
   ========================================================================== */
function renderLogin() {
  document.getElementById('root').innerHTML = `
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">🍸</div>
      <h1>Noche Libre</h1>
      <p class="tag">Sistema de gestión de bar sincronizado</p>
      <div class="login-error" id="loginErr"></div>
      <div class="field"><label>Usuario</label><input type="text" id="lUser" autocomplete="username"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="lPass" autocomplete="current-password"></div>
      <button class="btn btn-primary btn-block" id="lBtn" onclick="doLogin()">Entrar al sistema</button>
    </div>
  </div>`;
  document.getElementById('lPass').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
  setTimeout(() => document.getElementById('lUser').focus(), 50);
}

function doLogin() {
  const u = document.getElementById('lUser').value.trim();
  const p = document.getElementById('lPass').value;
  const err = document.getElementById('loginErr');
  const db = loadDBLocally();
  const user = db.users.find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
  if (!user) { err.textContent = 'Usuario o contraseña incorrectos.'; return; }
  setSession({ id: user.id, name: user.name, username: user.username, role: user.role });
  logHistory('Inicio de sesión', user.name + ' entró al sistema');
  renderShell();
}

function doLogout() {
  const s = getSession();
  if (s) logHistory('Cierre de sesión', s.name + ' cerró sesión');
  clearSession(); renderLogin();
}

/* ==========================================================================
   SHELL
   ========================================================================== */
function renderShell() {
  const s = getSession();
  if(!s){ renderLogin(); return; }
  const views = ROLE_VIEWS[s.role] || [];
  if (!state.view || !views.includes(state.view)) state.view = views[0];

  const navItems = views.map(v => `
    <button class="navbtn ${state.view === v ? 'active' : ''}" onclick="goView('${v}')">
      <span class="ic">${VIEW_META[v].icon}</span>${VIEW_META[v].label}
    </button>`).join('');
  const bottomItems = views.map(v => `
    <button class="${state.view === v ? 'active' : ''}" onclick="goView('${v}')">
      <span class="bic">${VIEW_META[v].icon}</span>${VIEW_META[v].label}
    </button>`).join('');

  document.getElementById('root').innerHTML = `
  <div class="app-shell">
    <div class="sidebar">
      <div class="sidebar-brand"><div class="logo">🍸</div><div><strong>Noche Libre</strong><span>Sistema de bar</span></div></div>
      ${navItems}
      <div class="sidebar-foot">
        <button class="navbtn" onclick="manualRefresh()"><span class="ic">🔄</span>Sincronizar</button>
        <div class="userchip"><b>${s.name}</b>${ROLE_LABEL[s.role]}</div>
        <button class="navbtn" onclick="doLogout()"><span class="ic">🚪</span>Salir</button>
      </div>
    </div>
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
      <div class="topbar">
        <div class="tb-brand"><div class="tl">🍸</div>Noche Libre</div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-ghost" onclick="manualRefresh()">🔄</button>
          <button class="btn btn-sm btn-ghost" onclick="doLogout()">🚪</button>
        </div>
      </div>
      <div class="main" id="mainView"></div>
    </div>
  </div>
  <div class="bottomnav">${bottomItems}</div>`;
  renderView();
}

function goView(v) { state.view = v; renderShell(); }

async function manualRefresh() {
  toast('Sincronizando...');
  await fetchInitialData();
  renderView();
  toast('Datos actualizados desde la nube');
}

function renderView() {
  const el = document.getElementById('mainView'); if (!el) return;
  const map = { comandas: viewComandas, barra: viewBarra, caja: viewCaja, productos: viewProductos, corte: viewCorte, usuarios: viewUsuarios };
  el.innerHTML = (map[state.view] || (() => ''))();
  if (state.view === 'comandas') renderCart();
}

/* ==========================================================================
   VIEW: COMANDAS
   ========================================================================== */
function viewComandas() {
  const db = loadDBLocally();
  const s = getSession();
  const cats = ['Todos', ...new Set(db.products.map(p => p.category))];
  const chips = cats.map(c => `<button class="chip ${state.prodFilter === c ? 'active' : ''}" onclick="setProdFilter('${c}')">${c}</button>`).join('');
  const prods = db.products.filter(p => state.prodFilter === 'Todos' || p.category === state.prodFilter).sort((a, b) => a.name.localeCompare(b.name));
  const tiles = prods.map(p => `
    <button class="prod-tile" onclick="addToCart(${p.id})">
      <span class="pname">${p.name}</span>
      <span class="pcat">${p.category}</span>
      ${p.description ? `<span class="pdesc">${p.description}</span>` : ''}
      <span class="pprice">${money(p.price)}</span>
    </button>`).join('') || `<div class="empty-state" style="grid-column:1/-1;">Sin productos.</div>`;

  const activeOrders = db.orders.filter(o => o.meseroId == s.id && o.status !== 'entregado');
  const myOrdersHtml = activeOrders.length ? activeOrders.map(o => `
    <div style="border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-bottom: 8px; background: var(--surface);">
      <div class="flex-between">
        <strong>${o.folio}</strong> - ${o.mesa}
        <span class="badge badge-${o.status}">${BAR_LABEL[o.status]}</span>
      </div>
      ${(o.status === 'en_barra' || o.status === 'listo') ? `<button class="btn btn-sm btn-success btn-block" style="margin-top: 8px;" onclick="marcarEntregado(${o.id})">Marcar Entregado ✔</button>` : ''}
    </div>
  `).join('') : '<p class="muted">No tienes comandas pendientes.</p>';

  return `
  <div class="view-head">
    <div><h2>Levantar comanda</h2></div>
  </div>
  <div class="order-grid">
    <div class="card">
      <div class="section-label">Menú del bar</div>
      <div class="chips">${chips}</div>
      <div class="prod-grid">${tiles}</div>
      
      <div class="section-label" style="margin-top: 25px; color: var(--neon);">MIS PEDIDOS ACTIVOS</div>
      ${myOrdersHtml}
    </div>
    
    <div class="card card-neon" style="position: sticky; top: 20px;">
      <div class="section-label">Comanda activa</div>
      <div class="field">
        <label>Mesa / Cliente (Obligatorio) *</label>
        <input type="text" id="mesaInput" placeholder="Ej. Mesa 5, Carlos..." value="${state.mesa}" oninput="state.mesa=this.value">
      </div>
      <div id="cartWrap"></div>
      <div class="field" style="margin-top:10px;">
        <label>Notas del pedido</label>
        <textarea id="notesInput" placeholder="Sin hielo, bien frías..." oninput="state.generalNotes=this.value">${state.generalNotes}</textarea>
      </div>
      <button class="btn btn-primary btn-block" onclick="submitOrder()">Enviar a barra y caja →</button>
    </div>
  </div>`;
}

function setProdFilter(c) { state.prodFilter = c; renderView(); }
function marcarEntregado(id) {
  const db = loadDBLocally();
  const o = db.orders.find(x => x.id === id); if(!o) return;
  o.status = 'entregado'; saveDB(db);
  toast('Comanda entregada al cliente');
  renderView();
}

function addToCart(pid) {
  const db = loadDBLocally();
  const p = db.products.find(x => x.id === pid); if (!p) return;
  const ex = state.cart.find(i => i.productId === pid);
  if (ex) ex.qty++; else state.cart.push({ productId: pid, name: p.name, price: p.price, qty: 1, notes: '' });
  renderCart();
}
function changeQty(pid, d) {
  const i = state.cart.find(x => x.productId === pid); if (!i) return;
  i.qty += d;
  if (i.qty <= 0) state.cart = state.cart.filter(x => x.productId !== pid);
  renderCart();
}
function setItemNote(pid, v) { const i = state.cart.find(x => x.productId === pid); if (i) i.notes = v; }

function renderCart() {
  const w = document.getElementById('cartWrap'); if (!w) return;
  if (state.cart.length === 0) {
    w.innerHTML = `<div class="empty-cart"><span class="ic">🍹</span>Agrega bebidas desde el menú.</div>`; return;
  }
  const items = state.cart.map(i => `
    <div class="cart-item">
      <div class="ci-main"><span class="ci-name">${i.name}</span><input class="ci-note" placeholder="Nota" value="${i.notes}" oninput="setItemNote(${i.productId},this.value)"></div>
      <div class="qty-ctrl"><button onclick="changeQty(${i.productId},-1)">−</button><span>${i.qty}</span><button onclick="changeQty(${i.productId},1)">+</button></div>
      <div class="ci-price">${money(i.price * i.qty)}</div>
    </div>`).join('');
  const total = state.cart.reduce((a, i) => a + i.price * i.qty, 0);
  w.innerHTML = items + `<div class="total-row"><span>Total comanda</span><span>${money(total)}</span></div>`;
}

function submitOrder() {
  if (state.cart.length === 0) { toast('Agrega al menos una bebida'); return; }
  if (!state.mesa.trim()) { toast('El dato de Mesa/Cliente es OBLIGATORIO.'); document.getElementById('mesaInput').focus(); return; }
  
  const db = loadDBLocally(); const s = getSession();
  const total = state.cart.reduce((a, i) => a + i.price * i.qty, 0);
  const id = nextId(db, 'order');
  const order = {
    id, folio: 'NL-' + String(id).padStart(4, '0'),
    mesa: state.mesa.trim(), items: state.cart.map(i => ({ ...i })),
    generalNotes: state.generalNotes.trim(),
    meseroId: s.id, meseroName: s.name, status: 'espera', paymentStatus: 'pendiente',
    payments: [], total, discount: 0, discountReason: '', tip: 0,
    createdAt: new Date().toISOString(), paidAt: null, paidBy: null
  };
  db.orders.unshift(order); saveDB(db);
  logHistory('Comanda creada', `${order.folio} · ${order.mesa}`);
  toast(`Comanda enviada a barra`);
  state.cart = []; state.mesa = ''; state.generalNotes = '';
  renderView();
}

/* ==========================================================================
   VIEW: BARRA
   ========================================================================== */
function viewBarra() {
  const db = loadDBLocally();
  let orders = [...db.orders];
  if (state.barraFilter === 'activos') orders = orders.filter(o => o.status !== 'entregado');
  orders.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

  const cards = orders.map(o => {
    const si = BAR_STEPS.indexOf(o.status);
    const rail = BAR_STEPS.map((st, i) => `<div class="rdot ${i <= si ? 'done' : ''}"></div>${i < BAR_STEPS.length - 1 ? `<div class="rseg ${i < si ? 'done' : ''}"></div>` : ''}`).join('');
    const items = o.items.map(i => `<li><span>${i.qty}× ${i.name}${i.notes ? ` <em class="muted">(${i.notes})</em>` : ''}</span></li>`).join('');
    const next = BAR_STEPS[si + 1];
    return `<div class="ticket-card status-${o.status}">
      <div class="ticket-head">
        <div class="flex-between"><span class="ticket-folio">${o.folio}</span><span class="badge badge-${o.status}">${BAR_LABEL[o.status]}</span></div>
        <div class="ticket-meta">Mesero: ${o.meseroName}</div>
        <div class="ticket-meta" style="color:var(--ink); font-weight: bold; font-size: 14px;">📍 ${o.mesa}</div>
      </div>
      <div class="status-rail">${rail}</div>
      <div class="ticket-body">
        <ul>${items}</ul>
        ${o.generalNotes ? `<div class="ticket-note">📝 ${o.generalNotes}</div>` : ''}
      </div>
      <div class="ticket-foot">
        ${si > 0 ? `<button class="btn btn-sm btn-ghost" onclick="setBarStatus(${o.id},'${BAR_STEPS[si - 1]}')">← Regresar</button>` : ''}
        ${next ? `<button class="btn btn-sm btn-success btn-block" onclick="setBarStatus(${o.id},'${next}')">→ ${BAR_LABEL[next]}</button>` : `<span class="muted" style="font-size:12.5px;padding:4px 0;">✔ Entregado al cliente</span>`}
      </div>
    </div>`;
  }).join('') || `<div class="empty-state"><span class="eic">🍸</span>No hay comandas activas en la barra.</div>`;

  return `
  <div class="view-head">
    <div><h2>Barra</h2><p>Prepara las bebidas y avisa al mesero.</p></div>
    <div class="chips">
      <button class="chip ${state.barraFilter === 'activos' ? 'active' : ''}" onclick="setBarraFilter('activos')">Activos</button>
      <button class="chip ${state.barraFilter === 'todos' ? 'active' : ''}" onclick="setBarraFilter('todos')">Todos</button>
    </div>
  </div>
  <div class="ticket-grid">${cards}</div>`;
}

function setBarraFilter(f) { state.barraFilter = f; renderView(); }
function setBarStatus(id, status) {
  const db = loadDBLocally();
  const o = db.orders.find(x => x.id === id); if (!o) return;
  o.status = status; saveDB(db);
  logHistory('Estatus barra', `${o.folio} → ${BAR_LABEL[status]}`);
  renderView();
}

/* ==========================================================================
   VIEW: CAJA
   ========================================================================== */
function viewCaja() {
  const db = loadDBLocally();
  let orders = [...db.orders];
  if (state.cajaFilter === 'pendientes') orders = orders.filter(o => o.paymentStatus === 'pendiente');
  orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  const rows = orders.map(o => {
    let currentTotal = o.total - (o.discount || 0) + (o.tip || 0);
    return `<div class="caja-row">
      <div>
        <div class="cname">${o.folio} · ${o.mesa}</div>
        <div class="csub">Mesero: ${o.meseroName} · <span class="badge badge-${o.status}">${BAR_LABEL[o.status]}</span></div>
      </div>
      <div class="camount">${money(currentTotal)}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <span class="badge badge-${o.paymentStatus}">${o.paymentStatus === 'pagado' ? 'Pagado' : 'Pendiente'}</span>
        <button class="btn btn-sm" onclick="openTicket(${o.id})">Ticket</button>
        ${o.paymentStatus === 'pendiente' ? `<button class="btn btn-sm btn-amber" onclick="openPayModal(${o.id})">Cobrar</button>` : ''}
      </div>
    </div>`;
  }).join('') || `<div class="empty-state">No hay cuentas en esta vista.</div>`;

  const tk = todayKey();
  const todays = db.orders.filter(o => o.paymentStatus === 'pagado' && o.paidAt && todayKey(new Date(o.paidAt)) === tk);
  const dayTotal = todays.reduce((a, o) => a + (o.total - (o.discount||0) + (o.tip||0)), 0);
  const bm = { efectivo: 0, tarjeta: 0, transferencia: 0 };
  todays.forEach(o => o.payments.forEach(p => bm[p.method] = (bm[p.method] || 0) + p.amount));

  return `
  <div class="view-head">
    <div><h2>Caja</h2></div>
    <div class="chips">
      <button class="chip ${state.cajaFilter === 'pendientes' ? 'active' : ''}" onclick="setCajaFilter('pendientes')">Pendientes</button>
      <button class="chip ${state.cajaFilter === 'todos' ? 'active' : ''}" onclick="setCajaFilter('todos')">Todas</button>
    </div>
  </div>
  <div class="caja-grid">
    <div>${rows}</div>
    <div class="card card-neon" style="position: sticky; top: 20px;">
      <div class="section-label">Resumen de Hoy</div>
      <div class="stat-card neon-card" style="margin-bottom:12px;">
        <div class="stat-label">Total cobrado hoy</div>
        <div class="stat-val">${money(dayTotal)}</div>
      </div>
      <table>
        <tr><td style="color:var(--ink-mid);">Efectivo</td><td style="text-align:right" class="mono amber-text">${money(bm.efectivo)}</td></tr>
        <tr><td style="color:var(--ink-mid);">Tarjeta</td><td style="text-align:right" class="mono amber-text">${money(bm.tarjeta)}</td></tr>
        <tr><td style="color:var(--ink-mid);">Transferencia</td><td style="text-align:right" class="mono amber-text">${money(bm.transferencia)}</td></tr>
      </table>
    </div>
  </div>
  <div id="modalHost"></div>`;
}

function setCajaFilter(f) { state.cajaFilter = f; renderView(); }

/* ---------- Modal de cobro con Descuento/Propina ---------- */
function openPayModal(orderId) {
  const db = loadDBLocally();
  const o = db.orders.find(x => x.id === orderId); if (!o) return;
  state.payDraft = { orderId, splits: [{ method: 'efectivo', amount: o.total }], discount: 0, discountReason: '', tip: 0 };
  renderPayModal();
}

function renderPayModal() {
  const db = loadDBLocally(); const d = state.payDraft;
  if (!d) { const h = document.getElementById('modalHost'); if (h) h.innerHTML = ''; return; }
  const o = db.orders.find(x => x.id === d.orderId); if (!o) return;
  
  const finalTotal = o.total - d.discount + d.tip;
  const paid = d.splits.reduce((a, s) => a + (Number(s.amount) || 0), 0);
  const rem = +(finalTotal - paid).toFixed(2);
  
  const splits = d.splits.map((s, idx) => `
    <div class="split-row">
      <select onchange="updateSplitMethod(${idx},this.value)">
        <option value="efectivo" ${s.method === 'efectivo' ? 'selected' : ''}>Efectivo</option>
        <option value="tarjeta" ${s.method === 'tarjeta' ? 'selected' : ''}>Tarjeta</option>
        <option value="transferencia" ${s.method === 'transferencia' ? 'selected' : ''}>Transferencia</option>
      </select>
      <input type="number" step="any" value="${s.amount}" oninput="updateSplitAmount(${idx},this.value)">
      ${d.splits.length > 1 ? `<button class="btn btn-sm btn-danger" onclick="removeSplit(${idx})">✕</button>` : ''}
    </div>`).join('');

  const mh = document.getElementById('modalHost'); if (!mh) return;
  mh.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closePayModal()">
    <div class="modal">
      <button class="modal-close" onclick="closePayModal()">✕</button>
      <h2>Cobrar ${o.folio} - ${o.mesa}</h2>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
        <div class="field">
           <label>Descuento ($)</label>
           <input type="number" step="any" value="${d.discount}" oninput="state.payDraft.discount = Number(this.value)||0; updateFirstSplitAmount(); renderPayModal();">
        </div>
        <div class="field">
           <label>Motivo Descuento</label>
           <input type="text" value="${d.discountReason}" oninput="state.payDraft.discountReason = this.value">
        </div>
      </div>
      <div class="field">
        <label>Propina ($)</label>
        <input type="number" step="any" value="${d.tip}" oninput="state.payDraft.tip = Number(this.value)||0; updateFirstSplitAmount(); renderPayModal();">
      </div>
      
      <div class="divider"></div>
      <div class="section-label">Subtotal: ${money(o.total)} | Total a Cobrar: <span class="amber-text">${money(finalTotal)}</span></div>
      
      <div class="section-label" style="margin-top: 15px;">Formas de pago libre</div>
      ${splits}
      <button class="btn btn-sm btn-ghost" onclick="addSplit()" style="margin-bottom:14px;">+ Añadir otro método</button>
      
      <div class="total-row">
        <span>${rem === 0 ? '✔ Saldado' : (rem > 0 ? 'Pendiente' : 'Cambio para el cliente')}</span>
        <span style="color:${rem === 0 ? 'var(--teal)' : 'var(--danger)'};">${money(Math.abs(rem))}</span>
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:14px;" ${rem > 0 ? 'disabled' : ''} onclick="confirmPayment()">Confirmar cobro</button>
    </div>
  </div>`;
}
function updateFirstSplitAmount() {
  const db = loadDBLocally(); const o = db.orders.find(x => x.id === state.payDraft.orderId);
  const ft = o.total - state.payDraft.discount + state.payDraft.tip;
  if(state.payDraft.splits.length === 1) state.payDraft.splits[0].amount = ft;
}
function addSplit() { state.payDraft.splits.push({ method: 'tarjeta', amount: 0 }); renderPayModal(); }
function removeSplit(i) { state.payDraft.splits.splice(i, 1); renderPayModal(); }
function updateSplitMethod(i, v) { state.payDraft.splits[i].method = v; renderPayModal(); }
function updateSplitAmount(i, v) { state.payDraft.splits[i].amount = parseFloat(v) || 0; renderPayModal(); }
function closePayModal() { state.payDraft = null; const h = document.getElementById('modalHost'); if (h) h.innerHTML = ''; }

function confirmPayment() {
  const db = loadDBLocally(); const d = state.payDraft; const s = getSession();
  const o = db.orders.find(x => x.id === d.orderId); if (!o) return;
  o.paymentStatus = 'pagado';
  o.discount = d.discount;
  o.discountReason = d.discountReason;
  o.tip = d.tip;
  o.payments = d.splits.map(s => ({ method: s.method, amount: Number(s.amount) || 0 }));
  o.paidAt = new Date().toISOString(); o.paidBy = s.name;
  saveDB(db);
  logHistory('Cuenta cobrada', `${o.folio} · Final: ${money(o.total - o.discount + o.tip)}`);
  toast(`Cuenta cobrada exitosamente`);
  closePayModal(); renderView(); openTicket(o.id);
}

function openTicket(orderId) {
  const db = loadDBLocally();
  const o = db.orders.find(x => x.id === orderId); if (!o) return;
  const items = o.items.map(i => `<div style="display:flex;justify-content:space-between;font-size:13px;"><span>${i.qty}× ${i.name}</span><span class="amber-text">${money(i.price * i.qty)}</span></div>`).join('');
  const pays = o.payments.length ? `<div style="margin-top:8px;">${o.payments.map(p => `<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--ink-mid);">${p.method}</span><span class="amber-text">${money(p.amount)}</span></div>`).join('')}</div>` : '';
  
  let extras = '';
  if(o.discount > 0) extras += `<div style="display:flex;justify-content:space-between;font-size:13px; color:var(--danger);"><span>Desc (${o.discountReason})</span><span>-${money(o.discount)}</span></div>`;
  if(o.tip > 0) extras += `<div style="display:flex;justify-content:space-between;font-size:13px; color:var(--teal);"><span>Propina</span><span>${money(o.tip)}</span></div>`;
  const finalT = o.total - (o.discount||0) + (o.tip||0);

  const mh = document.getElementById('modalHost'); if (!mh) return;
  const ov = document.createElement('div'); ov.className = 'modal-overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.innerHTML = `<div class="modal" style="max-width:340px;font-family:'IBM Plex Mono',monospace;">
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <div style="text-align:center;margin-bottom:12px;"><h2>Noche Libre</h2><div class="muted">${o.folio} · ${fmtDT(o.createdAt)}</div></div>
    <div style="font-size:12.5px;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);padding:8px 0;margin-bottom:10px;color:var(--ink-mid);">Mesa: ${o.mesa}<br>Atendió: ${o.meseroName}</div>
    ${items}
    <div style="margin-top: 5px;">${extras}</div>
    <div class="total-row" style="margin-top:12px;"><span>Total</span><span>${money(finalT)}</span></div>
    ${pays}
    <button class="btn btn-amber btn-block" style="margin-top:14px;" onclick="window.print()">🖨 Imprimir</button>
  </div>`;
  mh.appendChild(ov);
}

/* ==========================================================================
   VIEW: PRODUCTOS
   ========================================================================== */
function viewProductos() {
  const db = loadDBLocally();
  const search = (state.prodSearch || '').toLowerCase();
  
  const filtered = db.products.filter(p => 
    p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search)
  ).sort((a, b) => a.name.localeCompare(b.name));

  const rows = filtered.map(p => `<tr>
    <td>${p.name}</td><td>${p.category}</td><td class="muted" style="font-size:11px;">${p.description||''}</td>
    <td class="mono amber-text">${money(p.price)}</td>
    <td style="text-align:right;">
      <button class="btn btn-sm" onclick="openProdModal(${p.id})">Editar</button>
      <button class="btn btn-sm btn-danger" onclick="deleteProd(${p.id})">Borrar</button>
    </td>
  </tr>`).join('') || `<tr><td colspan="5" class="empty-state">No hay resultados.</td></tr>`;

  return `
  <div class="view-head">
    <div><h2>Productos</h2></div>
    <button class="btn btn-primary" onclick="openProdModal()">+ Nuevo producto</button>
  </div>
  <div class="card table-wrap">
    <div class="field search-bar">
      <input type="text" placeholder="🔍 Filtrar por nombre o categoría..." value="${state.prodSearch}" oninput="state.prodSearch=this.value; renderView();">
    </div>
    <table>
      <thead><tr><th>Nombre</th><th>Categoría</th><th>Descripción</th><th>Precio</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div id="modalHost"></div>`;
}

function openProdModal(pid) {
  const db = loadDBLocally();
  const p = pid ? db.products.find(x => x.id === pid) : { name: '', price: '', category: '', description: '' };
  const mh = document.getElementById('modalHost'); if (!mh) return;
  const cats = ['Cervezas', 'Cocteles', 'Shots', 'Destilados', 'Vinos', 'Sin Alcohol', 'Botanas', 'Otros'];
  mh.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeMH()">
    <div class="modal">
      <button class="modal-close" onclick="closeMH()">✕</button>
      <h2>${pid ? 'Editar producto' : 'Nuevo producto'}</h2>
      <div class="field"><label>Nombre</label><input id="pfN" value="${p.name}"></div>
      <div class="field"><label>Categoría</label>
        <select id="pfC">${cats.map(c => `<option value="${c}" ${p.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Descripción</label><input id="pfD" value="${p.description||''}" placeholder="Opcional. Ej. 355ml"></div>
      <div class="field"><label>Precio</label><input id="pfP" type="number" step="any" value="${p.price}"></div>
      <button class="btn btn-primary btn-block" onclick="saveProd(${pid || 'null'})">Guardar</button>
    </div>
  </div>`;
}
function saveProd(pid) {
  const name = document.getElementById('pfN').value.trim();
  const cat = document.getElementById('pfC').value || 'Otros';
  const desc = document.getElementById('pfD').value.trim();
  const price = parseFloat(document.getElementById('pfP').value) || 0;
  if (!name) { toast('Falta el nombre'); return; }
  const db = loadDBLocally();
  if (pid) {
    const p = db.products.find(x => x.id === pid);
    Object.assign(p, { name, category: cat, price, description: desc });
  } else {
    db.products.push({ id: nextId(db, 'product'), name, category: cat, price, description: desc });
  }
  saveDB(db); closeMH(); toast('Producto guardado'); renderView();
}
function deleteProd(pid) {
  const db = loadDBLocally(); const p = db.products.find(x => x.id === pid);
  if (!confirm('¿Eliminar ' + (p ? p.name : '') + '?')) return;
  db.products = db.products.filter(x => x.id !== pid);
  saveDB(db); toast('Eliminado'); renderView();
}
function closeMH() { const h = document.getElementById('modalHost'); if (h) h.innerHTML = ''; }

/* ==========================================================================
   VIEW: CORTE DE CAJA
   ========================================================================== */
function computeSales(db, filterFn) {
  const paid = db.orders.filter(o => o.paymentStatus === 'pagado' && o.paidAt && filterFn(new Date(o.paidAt)));
  const total = paid.reduce((a, o) => a + (o.total - (o.discount||0) + (o.tip||0)), 0);
  const bm = { efectivo: 0, tarjeta: 0, transferencia: 0 };
  paid.forEach(o => o.payments.forEach(p => bm[p.method] = (bm[p.method] || 0) + p.amount));
  return { count: paid.length, total, bm };
}

function viewCorte() {
  const db = loadDBLocally(); const tk = todayKey();
  
  // Lógicas de reseteo manual
  const weekLimit = db.counters.resetWeek ? new Date(db.counters.resetWeek) : new Date(0);
  const monthLimit = db.counters.resetMonth ? new Date(db.counters.resetMonth) : new Date(0);
  
  const dayS = computeSales(db, d => todayKey(d) === tk);
  const wkS = computeSales(db, d => d >= weekLimit);
  const mthS = computeSales(db, d => d >= monthLimit);
  
  const cashOpen = db.cash.date === tk;
  const finalCash = cashOpen ? (Number(db.cash.initial) || 0) + dayS.bm.efectivo : 0;

  const closures = [...(db.closures || [])].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 12).map(c => `<tr>
    <td>${c.date}</td>
    <td class="mono">${money(c.initialCash)}</td><td class="mono amber-text">${money(c.actualCash)}</td>
    <td><span style="color:${c.difference>=0?'var(--teal)':'var(--danger)'}">${money(c.difference)}</span></td>
    <td class="mono">${money(c.totalSales)}</td>
    <td style="font-size:11px;">EF: ${money(c.byMethod.efectivo)}<br>TJ: ${money(c.byMethod.tarjeta)}<br>TR: ${money(c.byMethod.transferencia)}</td>
    <td>${c.closedBy}</td>
  </tr>`).join('') || `<tr><td colspan="7" class="empty-state">Sin cortes.</td></tr>`;

  return `
  <div class="view-head">
    <div><h2>Corte de caja</h2><p>Control de efectivo real y ventas.</p></div>
  </div>

  <div class="card card-neon" style="margin-bottom:18px;">
    <div class="section-label">Estado de Caja de Hoy</div>
    ${cashOpen ? `
      <p style="margin-bottom:14px;">Abierta por <b>${db.cash.openedBy}</b> con <span class="amber-text mono">${money(db.cash.initial)}</span> base.</p>
      <div class="stat-grid" style="margin-bottom:16px;">
        <div class="stat-card"><div class="stat-label">Caja inicial</div><div class="stat-val">${money(db.cash.initial)}</div></div>
        <div class="stat-card neon-card"><div class="stat-label">Efectivo en ventas</div><div class="stat-val">${money(dayS.bm.efectivo)}</div></div>
        <div class="stat-card"><div class="stat-label">Caja Esperada (Teórica)</div><div class="stat-val">${money(finalCash)}</div></div>
      </div>
      <button class="btn btn-primary" onclick="iniciarCierreCaja()">Realizar Corte (Declarar Efectivo) 🔒</button>` : `
      <p class="muted">Abre la caja para iniciar la jornada.</p>
      <div class="field" style="max-width:260px;"><label>Monto físico en caja inicial</label><input id="initCash" type="number" step="any" value="0"></div>
      <button class="btn btn-primary" onclick="abrirCaja()">Abrir caja</button>`}
  </div>

  <div class="stat-grid">
    <div class="stat-card neon-card">
      <div class="stat-label">Venta Hoy</div><div class="stat-val">${money(dayS.total)}</div><div class="stat-sub">${dayS.count} cuentas</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Venta Acumulada Semanal</div><div class="stat-val">${money(wkS.total)}</div><div class="stat-sub">${wkS.count} cuentas</div>
      <button class="btn btn-sm btn-ghost" style="margin-top:10px;" onclick="resetVentas('semana')">Reiniciar Semana</button>
    </div>
    <div class="stat-card">
      <div class="stat-label">Venta Acumulada Mensual</div><div class="stat-val">${money(mthS.total)}</div><div class="stat-sub">${mthS.count} cuentas</div>
      <button class="btn btn-sm btn-ghost" style="margin-top:10px;" onclick="resetVentas('mes')">Reiniciar Mes</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Histórico de Cierres de Caja</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Fecha</th><th>Inicial</th><th>Físico Reportado</th><th>Diferencia</th><th>Total Ventas</th><th>Desglose Métodos</th><th>Cerró</th></tr></thead>
      <tbody>${closures}</tbody>
    </table></div>
  </div>
  <div id="modalHost"></div>`;
}

function abrirCaja() {
  const val = parseFloat(document.getElementById('initCash')?.value) || 0;
  const db = loadDBLocally();
  db.cash = { date: todayKey(), initial: val, openedBy: getSession().name };
  saveDB(db); logHistory('Apertura', 'Inicial: ' + money(val)); renderView();
}

function resetVentas(tipo) {
  if(!confirm(`¿Seguro que deseas reiniciar el acumulado de ${tipo}?`)) return;
  const db = loadDBLocally();
  if(tipo === 'semana') db.counters.resetWeek = new Date().toISOString();
  if(tipo === 'mes') db.counters.resetMonth = new Date().toISOString();
  saveDB(db); renderView(); toast(`Acumulado de ${tipo} reiniciado`);
}

function iniciarCierreCaja() {
  const db = loadDBLocally();
  const dayS = computeSales(db, d => todayKey(d) === todayKey());
  const finalCashEsperado = (Number(db.cash.initial) || 0) + dayS.bm.efectivo;
  
  const mh = document.getElementById('modalHost');
  mh.innerHTML = `<div class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeMH()">✕</button>
      <h2>Declaración de Efectivo</h2>
      <p class="muted">El sistema espera encontrar <b>${money(finalCashEsperado)}</b> en caja según el inicial y el efectivo cobrado.</p>
      <div class="field" style="margin-top:20px;">
        <label>¿Cuánto dinero físico hay exactamente en la caja?</label>
        <input type="number" step="any" id="dineroFisico" placeholder="Ej. 1500.50">
      </div>
      <button class="btn btn-primary btn-block" onclick="ejecutarCierreReal(${finalCashEsperado})">Confirmar Cierre</button>
    </div>
  </div>`;
}

function ejecutarCierreReal(esperado) {
  const fisico = parseFloat(document.getElementById('dineroFisico').value);
  if(isNaN(fisico)) { toast('Ingresa el dinero físico válido'); return; }
  
  const diff = fisico - esperado;
  const msgExtra = diff === 0 ? "¡La caja cuadra perfecto!" : (diff > 0 ? `Sobran ${money(diff)}` : `Faltan ${money(Math.abs(diff))}`);
  if(!confirm(`Declaraste ${money(fisico)}.\nDiferencia: ${msgExtra}.\n¿Confirmar cierre?`)) return;

  const db = loadDBLocally(); const tk = todayKey();
  const dayS = computeSales(db, d => todayKey(d) === tk);
  db.closures.push({
    id: uid(), date: tk, initialCash: db.cash.initial, finalCash: esperado, actualCash: fisico, difference: diff,
    totalSales: dayS.total, byMethod: dayS.bm, ordersCount: dayS.count, closedBy: getSession().name, ts: new Date().toISOString()
  });
  db.cash = { date: null, initial: null, openedBy: null };
  saveDB(db); logHistory('Cierre', `Declarado: ${money(fisico)} (Dif: ${money(diff)})`);
  closeMH(); renderView(); toast('Corte realizado con éxito');
}

/* ==========================================================================
   VIEW: USUARIOS
   ========================================================================== */
function viewUsuarios() {
  const db = loadDBLocally();
  const rows = db.users.sort((a, b) => a.name.localeCompare(b.name)).map(u => `<tr>
    <td>${u.name}</td><td>${u.username}</td><td><span class="badge badge-${u.role}">${ROLE_LABEL[u.role]}</span></td>
    <td style="text-align:right;">
      <button class="btn btn-sm btn-ghost" onclick="verHistorialUsuario('${u.name}')">Ver Historial</button>
      <button class="btn btn-sm" onclick="openUserModal(${u.id})">Editar</button>
    </td>
  </tr>`).join('');

  return `
  <div class="view-head">
    <div><h2>Usuarios</h2></div>
    <button class="btn btn-primary" onclick="openUserModal()">+ Nuevo usuario</button>
  </div>
  <div class="card table-wrap" style="margin-bottom:18px;">
    <table><thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Acciones</th></tr></thead><tbody>${rows}</tbody></table>
  </div>
  <div id="modalHost"></div>`;
}

function verHistorialUsuario(nombre) {
  const db = loadDBLocally();
  const filtrado = db.history.filter(h => h.user === nombre).slice(0,50);
  const hist = filtrado.length ? filtrado.map(h => `<div class="hist-item"><div class="ht">${fmtDT(h.ts)}</div><div><b>${h.action}:</b> ${h.detail}</div></div>`).join('') : '<p class="muted">No hay movimientos.</p>';
  const mh = document.getElementById('modalHost');
  mh.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeMH()">
    <div class="modal" style="max-width: 500px;">
      <button class="modal-close" onclick="closeMH()">✕</button>
      <h2>Historial: ${nombre}</h2>
      <div class="hist-list">${hist}</div>
    </div>
  </div>`;
}

function openUserModal(uid_) {
  const db = loadDBLocally();
  const u = uid_ ? db.users.find(x => x.id === uid_) : { name: '', username: '', password: '', role: 'mesero' };
  const mh = document.getElementById('modalHost');
  mh.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeMH()">
    <div class="modal">
      <button class="modal-close" onclick="closeMH()">✕</button>
      <h2>${uid_ ? 'Editar' : 'Nuevo'}</h2>
      <div class="field"><label>Nombre</label><input id="ufN" value="${u.name}"></div>
      <div class="field"><label>Usuario</label><input id="ufU" value="${u.username}"></div>
      <div class="field"><label>Contraseña</label><input id="ufP" type="text" value="${u.password}"></div>
      <div class="field"><label>Rol</label>
        <select id="ufR">${Object.keys(ROLE_LABEL).map(r => `<option value="${r}" ${u.role === r ? 'selected' : ''}>${ROLE_LABEL[r]}</option>`).join('')}</select>
      </div>
      <button class="btn btn-primary btn-block" onclick="saveUser(${uid_ || 'null'})">Guardar</button>
    </div>
  </div>`;
}
function saveUser(uid_) {
  const name = document.getElementById('ufN').value.trim(); const username = document.getElementById('ufU').value.trim();
  const password = document.getElementById('ufP').value; const role = document.getElementById('ufR').value;
  if (!name || !username || !password) { toast('Campos requeridos'); return; }
  const db = loadDBLocally();
  if (uid_) Object.assign(db.users.find(x => x.id === uid_), { name, username, password, role });
  else db.users.push({ id: nextId(db, 'user'), name, username, password, role });
  saveDB(db); closeMH(); renderView();
}

/* ==========================================================================
   BOOTSTRAP
   ========================================================================== */
async function boot() {
  // Descarga remota primero para tener la versión master
  await fetchInitialData();
  document.querySelector('.loader-overlay').style.display = 'none';
  if (!getSession()) renderLogin();
  else renderShell();
}

window.addEventListener('storage', e => { if (e.key === DB_KEY) renderView(); });
boot();
</script>
</body>
</html>
